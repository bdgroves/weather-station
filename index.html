<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather Station</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg-deep: #0a0e17;
  --bg-panel: #111827;
  --bg-card: #1a2236;
  --bg-card-hover: #1f2a42;
  --border: #2a3550;
  --border-light: #374361;
  --text-primary: #e8ecf4;
  --text-secondary: #8895ad;
  --text-dim: #556380;
  --accent-amber: #f5a623;
  --accent-amber-dim: rgba(245,166,35,0.15);
  --accent-blue: #4da6ff;
  --accent-blue-dim: rgba(77,166,255,0.12);
  --accent-green: #34d399;
  --accent-red: #ef6868;
  --accent-purple: #a78bfa;
  --accent-orange: #fb923c;
  --font-display: 'Barlow Condensed', sans-serif;
  --font-body: 'IBM Plex Sans', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  --radius: 10px;
  --radius-sm: 6px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg-deep);
  color: var(--text-primary);
  font-family: var(--font-body);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── ALERTS BANNER ──────────────────────────── */
.alerts-bar { max-width: 1400px; margin: 0 auto; padding: 12px 24px 0; }
.alert-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 16px; border-radius: var(--radius-sm);
  margin-bottom: 6px; font-size: 13px;
  border: 1px solid; cursor: pointer;
  transition: opacity 0.15s;
}
.alert-item:hover { opacity: 0.85; }
.alert-red { background: rgba(239,104,104,0.1); border-color: rgba(239,104,104,0.4); color: var(--accent-red); }
.alert-orange { background: rgba(251,146,60,0.1); border-color: rgba(251,146,60,0.4); color: var(--accent-orange); }
.alert-yellow { background: rgba(251,191,36,0.1); border-color: rgba(251,191,36,0.4); color: #fbbf24; }
.alert-blue { background: rgba(77,166,255,0.1); border-color: rgba(77,166,255,0.3); color: var(--accent-blue); }
.alert-icon { font-size: 16px; flex-shrink: 0; }
.alert-text { flex: 1; font-family: var(--font-body); }
.alert-event { font-weight: 500; }
.alert-headline { font-size: 11px; opacity: 0.8; margin-top: 2px; }
.alert-severity { font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: 1px; flex-shrink: 0; }
.alert-expanded {
  display: none; margin-top: 8px; padding-top: 8px;
  border-top: 1px solid rgba(255,255,255,0.1);
  font-size: 11px; line-height: 1.5; opacity: 0.75;
  max-height: 120px; overflow-y: auto;
}

/* ── HEADER ─────────────────────────────────── */
.header { padding: 20px 24px 0; max-width: 1400px; margin: 0 auto; }
.header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.brand { display: flex; align-items: center; gap: 10px; }
.brand-icon {
  width: 32px; height: 32px;
  background: linear-gradient(135deg, var(--accent-amber), var(--accent-orange));
  border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px;
}
.brand h1 {
  font-family: var(--font-display); font-weight: 600; font-size: 20px;
  letter-spacing: 1.5px; text-transform: uppercase;
}
.timestamp { font-family: var(--font-mono); font-size: 11px; color: var(--text-dim); letter-spacing: 0.5px; }
.live-dot {
  display: inline-block; width: 6px; height: 6px; background: var(--accent-green);
  border-radius: 50%; margin-right: 6px; animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* ── TABS ───────────────────────────────────── */
.tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--border); }
.tab {
  font-family: var(--font-display); font-weight: 500; font-size: 14px;
  letter-spacing: 1px; text-transform: uppercase; color: var(--text-dim);
  background: none; border: none; padding: 10px 20px; cursor: pointer;
  border-bottom: 2px solid transparent; transition: all 0.2s;
  position: relative; bottom: -1px;
}
.tab:hover { color: var(--text-secondary); }
.tab.active { color: var(--accent-amber); border-bottom-color: var(--accent-amber); }
.tab .tab-temp { font-family: var(--font-mono); font-size: 11px; margin-left: 8px; color: var(--text-dim); }
.tab.active .tab-temp { color: var(--accent-amber); opacity: 0.7; }
.tab .tab-alert { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-left: 6px; vertical-align: middle; }

/* ── MAIN ───────────────────────────────────── */
.main { max-width: 1400px; margin: 0 auto; padding: 20px 24px 40px; }

/* ── HERO ───────────────────────────────────── */
.hero { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
.hero-current {
  background: var(--bg-panel); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 28px 32px; position: relative; overflow: hidden;
}
.hero-current::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, var(--accent-amber), var(--accent-orange), transparent);
}
.location-label {
  font-family: var(--font-display); font-weight: 300; font-size: 14px;
  text-transform: uppercase; letter-spacing: 2px; color: var(--text-dim); margin-bottom: 4px;
}
.location-name {
  font-family: var(--font-display); font-weight: 600; font-size: 18px;
  letter-spacing: 1px; text-transform: uppercase; color: var(--text-secondary); margin-bottom: 16px;
}
.location-name span { color: var(--text-dim); font-weight: 400; margin-left: 8px; font-size: 13px; }
.hero-temp-row { display: flex; align-items: flex-start; gap: 20px; }
.temp-big {
  font-family: var(--font-display); font-weight: 300; font-size: 96px;
  line-height: 1; letter-spacing: -2px;
}
.temp-big .deg { font-size: 40px; font-weight: 400; color: var(--text-secondary); vertical-align: super; }
.hero-condition { padding-top: 8px; }
.condition-icon { font-size: 36px; margin-bottom: 4px; }
.condition-desc {
  font-family: var(--font-display); font-size: 18px; font-weight: 500;
  letter-spacing: 0.5px; text-transform: uppercase; color: var(--text-secondary);
}
.hero-meta {
  display: flex; gap: 24px; margin-top: 16px; font-size: 13px;
  color: var(--text-dim); font-family: var(--font-mono);
}
.hero-meta span { display: flex; align-items: center; gap: 4px; }
.hero-meta .label { color: var(--text-dim); font-family: var(--font-body); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
.hero-meta .val { color: var(--text-secondary); }

/* ── GAUGE GRID ─────────────────────────────── */
.hero-gauges { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.gauge {
  background: var(--bg-panel); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px 18px; position: relative; overflow: hidden;
}
.gauge::after {
  content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 3px;
  background: var(--gauge-color, var(--border)); opacity: 0.5;
}
.gauge-label {
  font-family: var(--font-body); font-size: 10px; text-transform: uppercase;
  letter-spacing: 1.5px; color: var(--text-dim); margin-bottom: 8px;
}
.gauge-value {
  font-family: var(--font-display); font-weight: 600; font-size: 28px;
  letter-spacing: -0.5px; line-height: 1;
}
.gauge-value .unit { font-size: 14px; font-weight: 400; color: var(--text-dim); margin-left: 2px; }
.gauge-sub { font-family: var(--font-mono); font-size: 11px; color: var(--text-dim); margin-top: 4px; }

/* ── WIND COMPASS ───────────────────────────── */
.gauge-wind { display: flex; align-items: center; gap: 14px; }
.wind-compass { flex-shrink: 0; }
.wind-data { flex: 1; }

/* ── PRESSURE TREND ─────────────────────────── */
.pressure-trend-arrow {
  display: inline-block; font-size: 18px; margin-left: 6px; vertical-align: middle;
}
.trend-rising { color: var(--accent-green); }
.trend-falling { color: var(--accent-red); }
.trend-steady { color: var(--text-dim); }
.trend-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; }

/* ── SECTION TITLES ─────────────────────────── */
.section-title {
  font-family: var(--font-display); font-weight: 500; font-size: 13px;
  text-transform: uppercase; letter-spacing: 2px; color: var(--text-dim);
  margin-bottom: 12px; padding-left: 2px;
}

/* ── HOURLY STRIP ───────────────────────────── */
.hourly-wrap { margin-bottom: 20px; }
.hourly-scroll {
  display: flex; gap: 2px; overflow-x: auto; padding-bottom: 8px;
  scrollbar-width: thin; scrollbar-color: var(--border) transparent;
}
.hourly-scroll::-webkit-scrollbar { height: 4px; }
.hourly-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.hour-card {
  flex-shrink: 0; width: 68px; background: var(--bg-panel); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 10px 6px; text-align: center; transition: background 0.15s;
}
.hour-card:hover { background: var(--bg-card-hover); }
.hour-card.now { border-color: var(--accent-amber); background: var(--accent-amber-dim); }
.hour-time { font-family: var(--font-mono); font-size: 10px; color: var(--text-dim); margin-bottom: 6px; }
.hour-card.now .hour-time { color: var(--accent-amber); }
.hour-icon { font-size: 18px; margin-bottom: 4px; }
.hour-temp { font-family: var(--font-display); font-weight: 600; font-size: 16px; }
.hour-precip { font-family: var(--font-mono); font-size: 9px; color: var(--accent-blue); margin-top: 4px; }
.hour-wind { font-family: var(--font-mono); font-size: 9px; color: var(--text-dim); margin-top: 2px; }

/* ── 7-DAY FORECAST ─────────────────────────── */
.forecast-wrap { margin-bottom: 20px; }
.forecast-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
.day-card {
  background: var(--bg-panel); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px 10px; text-align: center; transition: background 0.15s;
}
.day-card:hover { background: var(--bg-card-hover); }
.day-card.today { border-color: var(--accent-amber); background: var(--accent-amber-dim); }
.day-name {
  font-family: var(--font-display); font-weight: 500; font-size: 12px;
  text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); margin-bottom: 2px;
}
.day-card.today .day-name { color: var(--accent-amber); }
.day-date { font-family: var(--font-mono); font-size: 10px; color: var(--text-dim); margin-bottom: 8px; }
.day-icon { font-size: 24px; margin-bottom: 6px; }
.day-temps { display: flex; justify-content: center; gap: 6px; font-family: var(--font-display); font-size: 15px; font-weight: 600; }
.day-hi { color: var(--text-primary); }
.day-lo { color: var(--text-dim); font-weight: 400; }
.day-precip { font-family: var(--font-mono); font-size: 10px; color: var(--accent-blue); margin-top: 6px; }
.day-wind { font-family: var(--font-mono); font-size: 9px; color: var(--text-dim); margin-top: 2px; }
.day-uv { font-family: var(--font-mono); font-size: 9px; color: var(--accent-purple); margin-top: 2px; }

/* ── DETAIL PANELS ──────────────────────────── */
.details-row { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 12px; margin-bottom: 20px; }
.detail-panel {
  background: var(--bg-panel); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 18px 20px;
}
.detail-panel h3 {
  font-family: var(--font-body); font-size: 10px; text-transform: uppercase;
  letter-spacing: 1.5px; color: var(--text-dim); margin-bottom: 12px;
}
.sun-times { display: flex; justify-content: space-between; align-items: center; }
.sun-item { text-align: center; }
.sun-icon { font-size: 20px; margin-bottom: 4px; }
.sun-label { font-family: var(--font-body); font-size: 10px; text-transform: uppercase; color: var(--text-dim); }
.sun-val { font-family: var(--font-mono); font-size: 15px; font-weight: 500; }
.sun-bar {
  flex: 1; height: 4px; background: var(--border); border-radius: 2px;
  margin: 0 16px; position: relative; overflow: hidden;
}
.sun-bar-fill {
  position: absolute; top: 0; left: 0; height: 100%;
  background: linear-gradient(90deg, var(--accent-orange), var(--accent-amber));
  border-radius: 2px;
}
.detail-stats { display: flex; flex-direction: column; gap: 10px; }
.detail-stat { display: flex; justify-content: space-between; align-items: center; }
.detail-stat .label { font-size: 12px; color: var(--text-dim); }
.detail-stat .val { font-family: var(--font-mono); font-size: 13px; color: var(--text-secondary); font-weight: 500; }

/* ── ASTRONOMY PANEL ────────────────────────── */
.moon-display { display: flex; align-items: center; gap: 16px; margin-bottom: 12px; }
.moon-emoji { font-size: 42px; }
.moon-info { flex: 1; }
.moon-phase-name {
  font-family: var(--font-display); font-size: 18px; font-weight: 600;
  letter-spacing: 0.5px; margin-bottom: 2px;
}
.moon-illum { font-family: var(--font-mono); font-size: 12px; color: var(--text-secondary); }
.moon-bar-track {
  width: 100%; height: 6px; background: var(--border); border-radius: 3px;
  margin: 10px 0; overflow: hidden;
}
.moon-bar-fill {
  height: 100%; border-radius: 3px;
  background: linear-gradient(90deg, var(--text-dim), var(--text-primary));
}

/* ── CHARTS ─────────────────────────────────── */
.chart-panel {
  background: var(--bg-panel); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 18px 20px; margin-bottom: 20px;
}
.chart-panel h3 {
  font-family: var(--font-body); font-size: 10px; text-transform: uppercase;
  letter-spacing: 1.5px; color: var(--text-dim); margin-bottom: 12px;
}
.chart-canvas { width: 100%; height: 120px; }
.chart-canvas canvas { width: 100%; height: 100%; }

/* ── AQI COLORS ─────────────────────────────── */
.aqi-good { color: var(--accent-green); }
.aqi-moderate { color: #fbbf24; }
.aqi-unhealthy-sg { color: var(--accent-orange); }
.aqi-unhealthy { color: var(--accent-red); }

/* ── FOOTER ─────────────────────────────────── */
.footer {
  max-width: 1400px; margin: 0 auto; padding: 0 24px 24px; text-align: center;
  font-family: var(--font-mono); font-size: 10px; color: var(--text-dim);
}
.footer a { color: var(--text-dim); text-decoration: none; }
.footer a:hover { color: var(--text-secondary); }

/* ── LOADING ────────────────────────────────── */
.loading { display: flex; align-items: center; justify-content: center; min-height: 60vh; flex-direction: column; gap: 16px; }
.loading-spinner { width: 40px; height: 40px; border: 2px solid var(--border); border-top-color: var(--accent-amber); border-radius: 50%; animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-family: var(--font-mono); font-size: 12px; color: var(--text-dim); }

/* ── RESPONSIVE ─────────────────────────────── */
@media (max-width: 1024px) {
  .hero { grid-template-columns: 1fr; }
  .forecast-grid { grid-template-columns: repeat(4, 1fr); }
  .details-row { grid-template-columns: 1fr 1fr; }
}
@media (max-width: 640px) {
  .temp-big { font-size: 72px; }
  .hero-gauges { grid-template-columns: 1fr; }
  .forecast-grid { grid-template-columns: repeat(3, 1fr); }
  .details-row { grid-template-columns: 1fr; }
  .tabs { overflow-x: auto; }
  .tab { font-size: 12px; padding: 8px 14px; white-space: nowrap; }
}
</style>
</head>
<body>

<div class="alerts-bar" id="alerts-bar"></div>

<div class="header">
  <div class="header-top">
    <div class="brand">
      <div class="brand-icon">🌡</div>
      <h1>Weather Station</h1>
    </div>
    <div class="timestamp" id="timestamp"><span class="live-dot"></span>Loading...</div>
  </div>
  <div class="tabs" id="tabs"></div>
</div>

<div class="main" id="main">
  <div class="loading">
    <div class="loading-spinner"></div>
    <div class="loading-text">Fetching station data...</div>
  </div>
</div>

<div class="footer">
  Data via <a href="https://open-meteo.com" target="_blank">Open-Meteo</a> &amp;
  <a href="https://www.weather.gov" target="_blank">NWS</a> &nbsp;·&nbsp;
  Updated every 15 min via GitHub Actions &nbsp;·&nbsp;
  <a href="https://brooksgroves.com" target="_blank">brooksgroves.com</a>
</div>

<script>
const STATION_ORDER = ['lakewood_wa','groveland_ca','reno_nv','death_valley_ca'];
const STATION_LABELS = { lakewood_wa:'Lakewood', groveland_ca:'Groveland', reno_nv:'Reno', death_valley_ca:'Death Valley' };

let DATA = null;
let activeStation = STATION_ORDER[0];

async function init() {
  try {
    const resp = await fetch('data/weather.json');
    DATA = await resp.json();
    renderTabs();
    renderStation(activeStation);
    updateTimestamp();
  } catch(e) {
    document.getElementById('main').innerHTML =
      `<div class="loading"><div class="loading-text">Unable to load weather data. Run the workflow first.</div></div>`;
  }
}

function updateTimestamp() {
  if (!DATA) return;
  const d = new Date(DATA.generated_utc);
  const mins = Math.round((new Date() - d) / 60000);
  const ts = d.toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit',hour12:true});
  document.getElementById('timestamp').innerHTML = `<span class="live-dot"></span>${ts} · ${mins}m ago`;
}

function renderTabs() {
  const c = document.getElementById('tabs');
  c.innerHTML = '';
  STATION_ORDER.forEach(key => {
    const s = DATA.stations[key];
    const btn = document.createElement('button');
    btn.className = 'tab' + (key === activeStation ? ' active' : '');
    const temp = s.current ? Math.round(s.current.temp) + '°' : '--';
    const alerts = (s.alerts || []);
    const alertDot = alerts.length > 0
      ? `<span class="tab-alert" style="background:${alerts[0].color === 'red' ? 'var(--accent-red)' : alerts[0].color === 'orange' ? 'var(--accent-orange)' : '#fbbf24'}"></span>`
      : '';
    btn.innerHTML = `${STATION_LABELS[key]}<span class="tab-temp">${temp}</span>${alertDot}`;
    btn.onclick = () => {
      activeStation = key;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      renderStation(key);
    };
    c.appendChild(btn);
  });
}

// ── HELPERS ──────────────────────────────────
function aqiClass(v) { if(v==null)return''; if(v<=50)return'aqi-good'; if(v<=100)return'aqi-moderate'; if(v<=150)return'aqi-unhealthy-sg'; return'aqi-unhealthy'; }
function aqiLabel(v) { if(v==null)return'N/A'; if(v<=50)return'Good'; if(v<=100)return'Moderate'; if(v<=150)return'USG'; if(v<=200)return'Unhealthy'; return'Very Unhealthy'; }
function uvLabel(v) { if(v==null)return''; if(v<=2)return'Low'; if(v<=5)return'Moderate'; if(v<=7)return'High'; if(v<=10)return'Very High'; return'Extreme'; }
function fmtTime(iso) { if(!iso)return'--'; return new Date(iso).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true}); }
function fmtHour(iso) { const h=new Date(iso).getHours(); if(h===0)return'12a'; if(h<12)return h+'a'; if(h===12)return'12p'; return(h-12)+'p'; }
function fmtDay(s) { return new Date(s+'T12:00:00').toLocaleDateString('en-US',{weekday:'short'}); }
function fmtDate(s) { return new Date(s+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'}); }
function isToday(s) { return s === new Date().toISOString().split('T')[0]; }
function isNowHour(iso) { const d=new Date(iso),n=new Date(); return d.getFullYear()===n.getFullYear()&&d.getMonth()===n.getMonth()&&d.getDate()===n.getDate()&&d.getHours()===n.getHours(); }
function r(v) { return v!=null?Math.round(v):'--'; }
function r1(v) { return v!=null?Math.round(v*10)/10:'--'; }
function visMi(ft) { return ft!=null?r1(ft/5280):'--'; }

// ── WIND COMPASS SVG ────────────────────────
function windCompassSVG(deg, speed) {
  if (deg == null) return '';
  const size = 80;
  const cx = size/2, cy = size/2, rad = 32;
  const dirs = ['N','E','S','W'];
  const dirPositions = [[cx,8],[size-6,cy],[cx,size-4],[8,cy]];

  // Arrow points INTO the wind (from direction), so rotate by deg (wind comes FROM this direction)
  const arrowAngle = deg;
  const toRad = d => d * Math.PI / 180;

  // Arrow shape: triangle pointing up, rotated
  const tipLen = 26;
  const baseW = 8;
  const ax = cx + tipLen * Math.sin(toRad(arrowAngle));
  const ay = cy - tipLen * Math.cos(toRad(arrowAngle));
  const bx = cx - baseW * Math.sin(toRad(arrowAngle - 90));
  const by = cy + baseW * Math.cos(toRad(arrowAngle - 90));
  const dx = cx + baseW * Math.sin(toRad(arrowAngle - 90));
  const dy = cy - baseW * Math.cos(toRad(arrowAngle - 90));
  // Tail
  const tx = cx - (tipLen * 0.6) * Math.sin(toRad(arrowAngle));
  const ty = cy + (tipLen * 0.6) * Math.cos(toRad(arrowAngle));

  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg">
    <circle cx="${cx}" cy="${cy}" r="${rad}" fill="none" stroke="#2a3550" stroke-width="1.5"/>
    <circle cx="${cx}" cy="${cy}" r="${rad-8}" fill="none" stroke="#1f2a42" stroke-width="0.5"/>
    ${dirs.map((d,i) => `<text x="${dirPositions[i][0]}" y="${dirPositions[i][1]}" text-anchor="middle" dominant-baseline="central" fill="${d==='N'?'#f5a623':'#556380'}" font-family="Barlow Condensed,sans-serif" font-size="10" font-weight="${d==='N'?'600':'400'}">${d}</text>`).join('')}
    <polygon points="${ax},${ay} ${bx},${by} ${tx},${ty} ${dx},${dy}" fill="#f5a623" opacity="0.9"/>
    <circle cx="${cx}" cy="${cy}" r="3" fill="#1a2236" stroke="#f5a623" stroke-width="1.5"/>
    <text x="${cx}" y="${cy+rad+2}" text-anchor="middle" fill="#8895ad" font-family="JetBrains Mono,monospace" font-size="9" dominant-baseline="hanging">${Math.round(speed)} mph</text>
  </svg>`;
}

// ── PRESSURE TREND ──────────────────────────
function pressureTrendHTML(trend) {
  if (!trend) return '';
  const cls = trend.direction.includes('rising') ? 'trend-rising' :
              trend.direction.includes('falling') ? 'trend-falling' : 'trend-steady';
  const label = trend.direction.replace('_', ' ');
  return `<span class="pressure-trend-arrow ${cls}">${trend.arrow}</span>
    <span class="trend-label ${cls}"> ${label} (${trend.change_3h > 0 ? '+' : ''}${trend.change_3h} hPa/3h)</span>`;
}

// ── ALERTS ──────────────────────────────────
function renderAlerts(alerts) {
  const bar = document.getElementById('alerts-bar');
  if (!alerts || alerts.length === 0) { bar.innerHTML = ''; return; }
  bar.innerHTML = alerts.map((a, i) => `
    <div class="alert-item alert-${a.color}" onclick="this.querySelector('.alert-expanded').style.display=this.querySelector('.alert-expanded').style.display==='block'?'none':'block'">
      <span class="alert-icon">⚠️</span>
      <div class="alert-text">
        <div class="alert-event">${a.event}</div>
        <div class="alert-headline">${a.headline || ''}</div>
        <div class="alert-expanded">${a.description}${a.instruction ? '<br><br><strong>Action:</strong> ' + a.instruction : ''}</div>
      </div>
      <span class="alert-severity">${a.severity}</span>
    </div>
  `).join('');
}

// ── MAIN RENDER ─────────────────────────────
function renderStation(key) {
  const s = DATA.stations[key];
  if (s.error) {
    document.getElementById('main').innerHTML =
      `<div class="loading"><div class="loading-text">Error: ${s.error}</div></div>`;
    return;
  }
  const c = s.current;
  const aq = s.air_quality;
  const daily = s.daily || [];
  const hourly = s.hourly || [];
  const today = daily[0] || {};
  const pt = s.pressure_trend || {};
  const moon = DATA.moon || {};
  const alerts = s.alerts || [];

  renderAlerts(alerts);

  let currentUV = null;
  for (const h of hourly) { if (isNowHour(h.time)) { currentUV = h.uv_index; break; } }

  const html = `
    <div class="hero">
      <div class="hero-current">
        <div class="location-label">Current Conditions</div>
        <div class="location-name">
          ${s.location.name}, ${s.location.state}
          <span>${s.location.elevation_ft.toLocaleString()} ft elev</span>
        </div>
        <div class="hero-temp-row">
          <div class="temp-big">${r(c.temp)}<span class="deg">°F</span></div>
          <div class="hero-condition">
            <div class="condition-icon">${c.weather_icon}</div>
            <div class="condition-desc">${c.weather_desc}</div>
          </div>
        </div>
        <div class="hero-meta">
          <span><span class="label">Feels like</span> <span class="val">${r(c.feels_like)}°</span></span>
          <span><span class="label">Hi/Lo</span> <span class="val">${r(today.temp_max)}° / ${r(today.temp_min)}°</span></span>
          <span><span class="label">Dew Pt</span> <span class="val">${r(c.dew_point)}°</span></span>
          <span><span class="label">Cloud</span> <span class="val">${r(c.cloud_cover)}%</span></span>
        </div>
      </div>

      <div class="hero-gauges">
        <div class="gauge" style="--gauge-color:var(--accent-blue)">
          <div class="gauge-label">Humidity</div>
          <div class="gauge-value">${r(c.humidity)}<span class="unit">%</span></div>
          <div class="gauge-sub">Dew point ${r(c.dew_point)}°F</div>
        </div>

        <div class="gauge" style="--gauge-color:var(--accent-green)">
          <div class="gauge-label">Wind</div>
          <div class="gauge-wind">
            ${windCompassSVG(c.wind_dir_deg, c.wind_speed)}
            <div class="wind-data">
              <div class="gauge-value">${r(c.wind_speed)}<span class="unit">mph</span></div>
              <div class="gauge-sub">${c.wind_dir || '--'} · Gusts ${r(c.wind_gusts)} mph</div>
            </div>
          </div>
        </div>

        <div class="gauge" style="--gauge-color:var(--accent-purple)">
          <div class="gauge-label">Barometer</div>
          <div class="gauge-value">${r1(c.pressure_msl)}<span class="unit">hPa</span></div>
          <div class="gauge-sub">${pressureTrendHTML(pt)}</div>
        </div>

        <div class="gauge" style="--gauge-color:var(--accent-amber)">
          <div class="gauge-label">UV Index</div>
          <div class="gauge-value">${currentUV != null ? r1(currentUV) : '--'}</div>
          <div class="gauge-sub">${uvLabel(currentUV)} · Max today ${r1(today.uv_max)}</div>
        </div>

        <div class="gauge" style="--gauge-color:var(--accent-orange)">
          <div class="gauge-label">Visibility</div>
          <div class="gauge-value">${visMi(c.visibility)}<span class="unit">mi</span></div>
          <div class="gauge-sub">${c.visibility!=null?(c.visibility/1000).toFixed(1)+' km':'--'}</div>
        </div>

        <div class="gauge" style="--gauge-color:${aq.us_aqi!=null?'var(--accent-green)':'var(--border)'}">
          <div class="gauge-label">Air Quality</div>
          <div class="gauge-value"><span class="${aqiClass(aq.us_aqi)}">${aq.us_aqi!=null?aq.us_aqi:'--'}</span><span class="unit"> AQI</span></div>
          <div class="gauge-sub">${aqiLabel(aq.us_aqi)}${aq.pm2_5!=null?' · PM2.5 '+r1(aq.pm2_5):''}</div>
        </div>
      </div>
    </div>

    <!-- HOURLY -->
    <div class="hourly-wrap">
      <div class="section-title">48-Hour Forecast</div>
      <div class="hourly-scroll">
        ${hourly.map(h => `
          <div class="hour-card${isNowHour(h.time)?' now':''}">
            <div class="hour-time">${isNowHour(h.time)?'NOW':fmtHour(h.time)}</div>
            <div class="hour-icon">${h.weather_icon}</div>
            <div class="hour-temp">${r(h.temp)}°</div>
            ${h.precip_prob>0?`<div class="hour-precip">${r(h.precip_prob)}%</div>`:''}
            <div class="hour-wind">${r(h.wind_speed)}</div>
          </div>
        `).join('')}
      </div>
    </div>

    <!-- 7-DAY -->
    <div class="forecast-wrap">
      <div class="section-title">7-Day Forecast</div>
      <div class="forecast-grid">
        ${daily.map(d => `
          <div class="day-card${isToday(d.date)?' today':''}">
            <div class="day-name">${isToday(d.date)?'Today':fmtDay(d.date)}</div>
            <div class="day-date">${fmtDate(d.date)}</div>
            <div class="day-icon">${d.weather_icon}</div>
            <div class="day-temps"><span class="day-hi">${r(d.temp_max)}°</span><span class="day-lo">${r(d.temp_min)}°</span></div>
            ${d.precip_prob_max>0?`<div class="day-precip">💧 ${r(d.precip_prob_max)}%</div>`:'<div class="day-precip">&nbsp;</div>'}
            <div class="day-wind">💨 ${r(d.wind_max)} mph</div>
            <div class="day-uv">UV ${r1(d.uv_max)}</div>

      </div>
    </div>

    <!-- DETAILS ROW -->
    <div class="details-row">
      <div class="detail-panel">
        <h3>Sun &amp; Daylight</h3>
        <div class="sun-times">
          <div class="sun-item">

            <div class="sun-label">Sunrise</div>
            <div class="sun-val">${fmtTime(today.sunrise)}</div>
          </div>
          <div class="sun-bar"><div class="sun-bar-fill" id="sun-progress"></div></div>
          <div class="sun-item">
            <div class="sun-icon">🌇</div>
            <div class="sun-label">Sunset</div>
            <div class="sun-val">${fmtTime(today.sunset)}</div>
          </div>
        </div>
        <div style="text-align:center;margin-top:10px">
          <span style="font-family:var(--font-mono);font-size:12px;color:var(--text-dim)">${today.daylight_hrs||'--'} hrs daylight</span>
        </div>
      </div>

      <div class="detail-panel">
        <h3>Precipitation</h3>
        <div class="detail-stats">
          <div class="detail-stat"><span class="label">Current</span><span class="val">${r1(c.precipitation)} in</span></div>
          <div class="detail-stat"><span class="label">Rain</span><span class="val">${r1(c.rain)} in</span></div>
          <div class="detail-stat"><span class="label">Snow</span><span class="val">${r1(c.snowfall)} in</span></div>
          <div class="detail-stat"><span class="label">Today Total</span><span class="val">${r1(today.precip_sum)} in</span></div>
        </div>
      </div>

      <div class="detail-panel">
        <h3>Air Quality</h3>
        <div class="detail-stats">
          <div class="detail-stat"><span class="label">US AQI</span><span class="val ${aqiClass(aq.us_aqi)}">${aq.us_aqi!=null?aq.us_aqi+' · '+aqiLabel(aq.us_aqi):'N/A'}</span></div>
          <div class="detail-stat"><span class="label">PM2.5</span><span class="val">${aq.pm2_5!=null?r1(aq.pm2_5)+' µg/m³':'N/A'}</span></div>
          <div class="detail-stat"><span class="label">PM10</span><span class="val">${aq.pm10!=null?r1(aq.pm10)+' µg/m³':'N/A'}</span></div>
          <div class="detail-stat"><span class="label">Ozone</span><span class="val">${aq.ozone!=null?r1(aq.ozone)+' µg/m³':'N/A'}</span></div>
        </div>
      </div>

      <div class="detail-panel">
        <h3>Astronomy</h3>
        <div class="moon-display">
          <div class="moon-emoji">${moon.emoji||'🌑'}</div>
          <div class="moon-info">
            <div class="moon-phase-name">${moon.phase_name||'--'}</div>
            <div class="moon-illum">${moon.illumination!=null?moon.illumination+'% illuminated':'--'}</div>
          </div>
        </div>
        <div class="moon-bar-track"><div class="moon-bar-fill" style="width:${moon.illumination||0}%"></div></div>
        <div class="detail-stats">
          <div class="detail-stat"><span class="label">Moon Age</span><span class="val">${moon.age_days||'--'} days</span></div>
          <div class="detail-stat"><span class="label">Full Moon in</span><span class="val">${moon.days_to_full||'--'} days</span></div>
          <div class="detail-stat"><span class="label">New Moon in</span><span class="val">${moon.days_to_new||'--'} days</span></div>
        </div>
      </div>
    </div>

    <!-- CHARTS -->
    <div class="chart-panel">
      <h3>24-Hour Temperature Trend</h3>
      <div class="chart-canvas"><canvas id="temp-chart"></canvas></div>
    </div>
    <div class="chart-panel">
      <h3>24-Hour Pressure Trend</h3>
      <div class="chart-canvas"><canvas id="pressure-chart"></canvas></div>
    </div>
  `;

  document.getElementById('main').innerHTML = html;

  // Sun progress
  if (today.sunrise && today.sunset) {
    const rise = new Date(today.sunrise).getTime(), set = new Date(today.sunset).getTime();
    const pct = Math.max(0, Math.min(100, ((Date.now() - rise) / (set - rise)) * 100));
    const bar = document.getElementById('sun-progress');
    if (bar) bar.style.width = pct + '%';
  }

  drawLineChart('temp-chart', hourly.slice(0,24), h=>h.temp, '°F', '#f5a623');
  drawLineChart('pressure-chart', hourly.slice(0,24), h=>h.pressure, ' hPa', '#a78bfa');
}

function drawLineChart(id, data, acc, unit, color) {
  const canvas = document.getElementById(id);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * dpr; canvas.height = rect.height * dpr;
  ctx.scale(dpr, dpr);
  const W = rect.width, H = rect.height;
  const vals = data.map(acc).filter(v => v!=null);
  if (!vals.length) return;
  const min = Math.min(...vals), max = Math.max(...vals), range = max-min||1;
  const pad=40, padR=10, padT=16, padB=20, cW=W-pad-padR, cH=H-padT-padB;

  ctx.strokeStyle='#1f2a42'; ctx.lineWidth=1;
  for(let i=0;i<=4;i++){
    const y=padT+(cH/4)*i;
    ctx.beginPath();ctx.moveTo(pad,y);ctx.lineTo(W-padR,y);ctx.stroke();
    ctx.fillStyle='#556380'; ctx.font='10px JetBrains Mono'; ctx.textAlign='right';
    ctx.fillText(Math.round((max-(range/4)*i)*10)/10+unit, pad-4, y+3);
  }
  ctx.fillStyle='#556380'; ctx.font='9px JetBrains Mono'; ctx.textAlign='center';
  for(let i=0;i<data.length;i+=4){
    ctx.fillText(fmtHour(data[i].time), pad+(i/(data.length-1))*cW, H-4);
  }
  ctx.strokeStyle=color; ctx.lineWidth=2; ctx.lineJoin='round'; ctx.beginPath();
  let first=true;
  data.forEach((d,i)=>{
    const v=acc(d); if(v==null)return;
    const x=pad+(i/(data.length-1))*cW, y=padT+cH-((v-min)/range)*cH;
    if(first){ctx.moveTo(x,y);first=false;}else ctx.lineTo(x,y);
  });
  ctx.stroke();
  const rgb=color==='#f5a623'?'245,166,35':'167,139,250';
  const grad=ctx.createLinearGradient(0,padT,0,padT+cH);
  grad.addColorStop(0,`rgba(${rgb},0.2)`); grad.addColorStop(1,`rgba(${rgb},0)`);
  ctx.lineTo(pad+cW,padT+cH); ctx.lineTo(pad,padT+cH); ctx.closePath();
  ctx.fillStyle=grad; ctx.fill();
}

window.addEventListener('resize',()=>{ if(DATA) renderStation(activeStation); });
init();
</script>
